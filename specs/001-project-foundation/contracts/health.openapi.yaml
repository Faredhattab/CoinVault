openapi: 3.1.0
info:
  title: CoinVault Foundation Health Contract
  version: 0.1.0
  description: Contract for Phase 1 local foundation health verification.
paths:
  /health:
    get:
      summary: Get aggregate and per-service health status
      operationId: getFoundationHealth
      tags:
        - foundation
      responses:
        "200":
          description: Foundation health status was evaluated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  summary: All services reachable
                  value:
                    status: ok
                    checked_at: "2026-05-11T12:00:00Z"
                    services:
                      web:
                        status: ok
                        message: "Frontend shell reachable"
                      backend:
                        status: ok
                        message: "Backend reachable"
                      database:
                        status: ok
                        message: "Local database reachable"
                      auth:
                        status: ok
                        message: "Local auth service reachable"
                      storage:
                        status: ok
                        message: "Local storage service reachable"
                unavailable:
                  summary: One service unavailable
                  value:
                    status: unavailable
                    checked_at: "2026-05-11T12:00:00Z"
                    services:
                      web:
                        status: ok
                        message: "Frontend shell reachable"
                      backend:
                        status: ok
                        message: "Backend reachable"
                      database:
                        status: unavailable
                        message: "Local database is not reachable"
                      auth:
                        status: ok
                        message: "Local auth service reachable"
                      storage:
                        status: ok
                        message: "Local storage service reachable"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - checked_at
        - services
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        checked_at:
          type: string
          format: date-time
        services:
          type: object
          required:
            - web
            - backend
            - database
            - auth
            - storage
          properties:
            web:
              $ref: "#/components/schemas/ServiceHealth"
            backend:
              $ref: "#/components/schemas/ServiceHealth"
            database:
              $ref: "#/components/schemas/ServiceHealth"
            auth:
              $ref: "#/components/schemas/ServiceHealth"
            storage:
              $ref: "#/components/schemas/ServiceHealth"
    ServiceHealth:
      type: object
      required:
        - status
        - message
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        latency_ms:
          type: number
          minimum: 0
        message:
          type: string
          minLength: 1
          description: User-safe diagnostic message. Must not include secrets.
    HealthStatus:
      type: string
      enum:
        - ok
        - degraded
        - unavailable
